<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 628" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <!-- 左侧：求解模式 蓝紫色调 -->
    <linearGradient id="solveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="solveHeader" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <!-- 右侧：对齐模式 暖橙色调 -->
    <linearGradient id="alignGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="alignHeader" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <!-- AI辅助分析：低调灰蓝色，虚线边框暗示辅助角色 -->
    <linearGradient id="aiAuxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <!-- 箭头（统一尺寸 8×6，refX=0 连线接箭头尾部） -->
    <marker id="arrowSolve" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="arrowAlign" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="arrowAlignRed" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
    <marker id="arrowAux" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <!-- 阴影 -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- 标题 -->
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2937">AI 能分析所有方案，但决定不了哪个更好</text>
  <text x="480" y="54" text-anchor="middle" font-size="13" fill="#6b7280">两种决策模式：AI 可以参与哪一种？</text>

  <!-- ============================================ -->
  <!-- 左侧面板：求解模式 -->
  <!-- ============================================ -->
  <rect x="30" y="74" width="400" height="518" rx="14" fill="url(#solveGrad)" stroke="#a5b4fc" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="74" width="400" height="44" rx="14" fill="url(#solveHeader)"/>
  <rect x="30" y="106" width="400" height="12" fill="url(#solveHeader)"/>
  <text x="230" y="102" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">求解模式</text>

  <!-- 标签 -->
  <text x="230" y="144" text-anchor="middle" font-size="12" fill="#6366f1" font-weight="600">有标准答案 · AI 完整参与全流程</text>

  <!-- 节点1：问题 -->
  <rect x="150" y="164" width="160" height="42" rx="8" fill="#ffffff" stroke="#a5b4fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="190" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1b4b">📋 问题</text>

  <!-- 箭头 1→2 -->
  <line x1="230" y1="206" x2="230" y2="236" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrowSolve)"/>

  <!-- 节点2：AI分析 -->
  <rect x="130" y="252" width="200" height="50" rx="8" fill="#ffffff" stroke="#818cf8" stroke-width="2" filter="url(#shadow)"/>
  <text x="230" y="274" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1b4b">🤖 AI 分析</text>
  <text x="230" y="293" text-anchor="middle" font-size="11" fill="#6b7280">枚举方案 · 量化对比 · 输出最优</text>

  <!-- 箭头 2→3 -->
  <line x1="230" y1="302" x2="230" y2="332" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrowSolve)"/>

  <!-- 节点3：最优解 -->
  <rect x="150" y="348" width="160" height="42" rx="8" fill="#6366f1" filter="url(#shadow)"/>
  <text x="230" y="374" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">✅ 最优解</text>

  <!-- 底部说明 -->
  <rect x="70" y="424" width="320" height="50" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="230" y="446" text-anchor="middle" font-size="13" fill="#4338ca" font-weight="600">终点：答案</text>
  <text x="230" y="464" text-anchor="middle" font-size="11" fill="#6366f1">数据中有最优解 → AI 独立跑完全程</text>

  <!-- 左侧标注：本质 — 面板最底部 -->
  <rect x="50" y="558" width="360" height="24" rx="6" fill="#f3f4f6"/>
  <text x="230" y="575" text-anchor="middle" font-size="11" fill="#6b7280">本质：信息不足 → AI 补充分析 → 求解</text>

  <!-- ============================================ -->
  <!-- 右侧面板：对齐模式 -->
  <!-- ============================================ -->
  <rect x="530" y="74" width="400" height="518" rx="14" fill="url(#alignGrad)" stroke="#fdba74" stroke-width="2" filter="url(#shadow)"/>
  <rect x="530" y="74" width="400" height="44" rx="14" fill="url(#alignHeader)"/>
  <rect x="530" y="106" width="400" height="12" fill="url(#alignHeader)"/>
  <text x="730" y="102" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">对齐模式</text>

  <!-- 标签 -->
  <text x="730" y="144" text-anchor="middle" font-size="12" fill="#f59e0b" font-weight="600">没有标准答案 · AI 只能辅助，不能决策</text>

  <!-- 节点1：问题 -->
  <rect x="650" y="164" width="160" height="42" rx="8" fill="#ffffff" stroke="#fdba74" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="190" text-anchor="middle" font-size="15" font-weight="600" fill="#78350f">📋 问题</text>

  <!-- 箭头 问题→AI辅助分析 -->
  <line x1="730" y1="206" x2="730" y2="232" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowAux)"/>

  <!-- 节点2：AI辅助分析（虚线边框，低调配色，暗示辅助角色） -->
  <rect x="630" y="248" width="200" height="46" rx="8" fill="url(#aiAuxGrad)" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="730" y="270" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">🤖 AI 辅助分析</text>
  <text x="730" y="287" text-anchor="middle" font-size="11" fill="#94a3b8">提供数据 · 列出选项 · 无法定夺</text>

  <!-- 箭头 AI→团队讨论 -->
  <line x1="730" y1="294" x2="730" y2="314" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowAlign)"/>
  <text x="750" y="314" font-size="10" fill="#d97706">作为参考</text>

  <!-- 节点3：团队讨论 -->
  <rect x="630" y="330" width="200" height="46" rx="8" fill="#ffffff" stroke="#fbbf24" stroke-width="2" filter="url(#shadow)"/>
  <text x="730" y="351" text-anchor="middle" font-size="15" font-weight="600" fill="#78350f">👥 团队讨论</text>
  <text x="730" y="369" text-anchor="middle" font-size="11" fill="#6b7280">各方表达观点 · 碰撞 · 协商</text>

  <!-- 两条分支路径（箭头留 8px 间隙） -->
  <!-- 左侧分支：偏好 -->
  <path d="M 680 376 L 680 394 L 640 394 L 640 400" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAlign)"/>

  <!-- 右侧分支：顾虑 -->
  <path d="M 780 376 L 780 394 L 820 394 L 820 400" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAlign)"/>

  <!-- 分支节点：偏好 -->
  <rect x="575" y="416" width="130" height="36" rx="8" fill="#ffffff" stroke="#fde68a" stroke-width="1.5"/>
  <text x="640" y="438" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">💡 各自偏好</text>

  <!-- 分支节点：顾虑 -->
  <rect x="755" y="416" width="130" height="36" rx="8" fill="#ffffff" stroke="#fde68a" stroke-width="1.5"/>
  <text x="820" y="438" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">⚠️ 各自顾虑</text>

  <!-- 汇合箭头（箭头留 8px 间隙） -->
  <path d="M 640 452 L 640 460 L 730 460 L 730 466" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowAlignRed)"/>
  <path d="M 820 452 L 820 460 L 730 460" fill="none" stroke="#ef4444" stroke-width="2"/>

  <!-- 节点4：调整 -->
  <rect x="650" y="482" width="160" height="38" rx="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="506" text-anchor="middle" font-size="14" font-weight="600" fill="#7f1d1d">🔄 调整 &amp; 共识</text>

  <!-- 底部说明 -->
  <rect x="570" y="526" width="320" height="28" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="730" y="545" text-anchor="middle" font-size="13" fill="#c2410c" font-weight="600">终点：共识 → 决策</text>

  <!-- 右侧标注：本质 — 面板最底部，与左侧对齐 -->
  <rect x="550" y="558" width="360" height="24" rx="6" fill="#f3f4f6"/>
  <text x="730" y="575" text-anchor="middle" font-size="11" fill="#6b7280">本质：信息不缺 → 需要碰撞 → 对齐</text>

  <!-- ============================================ -->
  <!-- 底部对比标注 -->
  <!-- ============================================ -->
  <rect x="200" y="604" width="560" height="18" rx="9" fill="#f3f4f6"/>
  <text x="480" y="617" text-anchor="middle" font-size="12" fill="#6b7280">AI 在左边可以从头跑到尾 · 在右边只能停在"团队讨论"之前，提供参考数据</text>
</svg>
